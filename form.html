<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Client Form</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="form-page">
        <h2>Service Inquiry Form</h2>
        <form id="client-form">
            <input type="text" id="fullName" placeholder="Full Name" required>
            <input type="tel" id="phone" placeholder="Phone Number" required>
            <input type="email" id="email" placeholder="Email Address" required>
            <input type="text" id="service" placeholder="What service do you want?" required>
            <button type="submit">Save</button>
        </form>

        <div class="submissions">
            <h3>Saved Clients</h3>
            <div id="owner-access">
                <input type="password" id="owner-password" placeholder="Owner password">
                <button type="button" id="unlock-btn">Access</button>
            </div>
            <div id="submission-area" style="display:none;">
                <div id="submission-list"></div>
                <a id="download-link" href="#" download="clients.csv" style="display:none; margin-top: 10px;">Download CSV</a>
            </div>
        </div>
    </div>

    <script>
        const form = document.getElementById('client-form');
        const list = document.getElementById('submission-list');
        const ownerAccess = document.getElementById('owner-access');
        const submissionArea = document.getElementById('submission-area');
        const unlockBtn = document.getElementById('unlock-btn');
        const ownerPasswordInput = document.getElementById('owner-password');
        const downloadLink = document.getElementById('download-link');
        const STORAGE_KEY = 'clientSubmissions';
        const OWNER_UNLOCKED_KEY = 'ownerUnlocked';
        const OWNER_PASSWORD = 'm1l@neEservices';

        function getApiUrl() {
            const params = new URLSearchParams(window.location.search);
            const configuredUrl = params.get('api');
            if (configuredUrl) {
                return configuredUrl.endsWith('/api/clients') ? configuredUrl : `${configuredUrl.replace(/\/$/, '')}/api/clients`;
            }

            if (window.location.origin && window.location.origin.startsWith('http')) {
                return `${window.location.origin}/api/clients`;
            }

            return 'http://127.0.0.1:3000/api/clients';
        }

        const API_URL = getApiUrl();

        function escapeCsv(value) {
            return '"' + String(value).replace(/"/g, '""') + '"';
        }

        function formatSubmittedAt(timestamp) {
            const date = timestamp ? new Date(timestamp) : new Date();
            return Number.isNaN(date.getTime()) ? 'Unknown time' : date.toLocaleString();
        }

        function getLocalSubmissions() {
            try {
                return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
            } catch (error) {
                console.error('Failed to load local submissions', error);
                return [];
            }
        }

        function saveLocalSubmissions(submissions) {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(submissions));
        }

        async function getStoredSubmissions() {
            const localSubmissions = getLocalSubmissions();

            try {
                const response = await fetch(API_URL, { headers: { Accept: 'application/json' } });
                if (response.ok) {
                    const remoteSubmissions = await response.json();
                    const normalizedRemote = Array.isArray(remoteSubmissions) ? remoteSubmissions : [];

                    if (normalizedRemote.length > 0) {
                        const mergedSubmissions = [...normalizedRemote];
                        const existingKeys = new Set(mergedSubmissions.map(item => `${item.fullName || ''}|${item.phone || ''}|${item.email || ''}|${item.service || ''}|${item.submittedAt || ''}`));
                        localSubmissions.forEach(item => {
                            const key = `${item.fullName || ''}|${item.phone || ''}|${item.email || ''}|${item.service || ''}|${item.submittedAt || ''}`;
                            if (!existingKeys.has(key)) {
                                mergedSubmissions.push(item);
                            }
                        });

                        saveLocalSubmissions(mergedSubmissions);
                        return mergedSubmissions;
                    }

                    if (localSubmissions.length > 0) {
                        return localSubmissions;
                    }
                }
            } catch (error) {
                console.warn('Shared storage unavailable, using browser storage instead.', error);
            }

            return localSubmissions;
        }

        async function saveSubmission(submission) {
            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(submission)
                });
                if (!response.ok) {
                    throw new Error('Failed to save remotely');
                }
            } catch (error) {
                console.warn('Remote save failed, but the submission is still being kept locally.', error);
                const localSubmissions = getLocalSubmissions();
                localSubmissions.push(submission);
                saveLocalSubmissions(localSubmissions);
            }
        }

        function buildCsv(submissions) {
            const header = ['Full Name', 'Phone Number', 'Email Address', 'Service', 'Submitted At'];
            const rows = submissions.map(item => [item.fullName, item.phone, item.email, item.service, formatSubmittedAt(item.submittedAt)]);
            return [header, ...rows].map(row => row.map(escapeCsv).join(',')).join('\n');
        }

        async function showOwnerView() {
            submissionArea.style.display = 'block';
            ownerAccess.style.display = 'none';
            stopRefreshTimer();
            await loadSubmissions();
            refreshTimer = setInterval(loadSubmissions, 3000);
        }

        function hideOwnerView() {
            submissionArea.style.display = 'none';
            ownerAccess.style.display = 'block';
            stopRefreshTimer();
        }

        let refreshTimer = null;

        function stopRefreshTimer() {
            if (refreshTimer) {
                clearInterval(refreshTimer);
                refreshTimer = null;
            }
        }

        function isOwnerUnlocked() {
            return localStorage.getItem(OWNER_UNLOCKED_KEY) === 'true';
        }

        async function loadSubmissions() {
            const submissions = await getStoredSubmissions();
            if (!submissions.length) {
                list.innerHTML = '<p>No submissions yet.</p>';
                downloadLink.href = '#';
                downloadLink.style.display = 'none';
                return;
            }

            list.innerHTML = submissions.map(item => `
                <div class="submission-item">
                    <strong>${item.fullName}</strong><br>
                    Phone: ${item.phone}<br>
                    Email: ${item.email}<br>
                    Service: ${item.service}<br>
                    <small>Submitted: ${formatSubmittedAt(item.submittedAt)}</small>
                </div>
            `).join('');

            const csvData = buildCsv(submissions);
            const blob = new Blob([csvData], { type: 'text/csv;charset=utf-8;' });
            const url = URL.createObjectURL(blob);
            downloadLink.href = url;
            downloadLink.style.display = 'inline-block';
        }

        form.addEventListener('submit', async function (e) {
            e.preventDefault();
            const submission = {
                fullName: document.getElementById('fullName').value.trim(),
                phone: document.getElementById('phone').value.trim(),
                email: document.getElementById('email').value.trim(),
                service: document.getElementById('service').value.trim(),
                submittedAt: new Date().toISOString()
            };

            await saveSubmission(submission);
            form.reset();
            if (isOwnerUnlocked()) {
                await showOwnerView();
            }
        });

        unlockBtn.addEventListener('click', async function () {
            if (ownerPasswordInput.value === OWNER_PASSWORD) {
                localStorage.setItem(OWNER_UNLOCKED_KEY, 'true');
                await showOwnerView();
            } else {
                alert('Access denied');
            }
        });

        if (isOwnerUnlocked()) {
            showOwnerView();
        } else {
            hideOwnerView();
        }
    </script>
</body>
</html>
