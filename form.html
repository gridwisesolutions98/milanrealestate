<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Client Form</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="form-page">
        <h2>Service Inquiry Form</h2>
        <form id="client-form">
            <input type="text" id="fullName" placeholder="Full Name" required>
            <input type="tel" id="phone" placeholder="Phone Number" required>
            <input type="email" id="email" placeholder="Email Address" required>
            <input type="text" id="service" placeholder="What service do you want?" required>
            <button type="submit">Save</button>
        </form>

        <div class="submissions">
            <h3>Saved Clients</h3>
            <div id="owner-access">
                <input type="password" id="owner-password" placeholder="Owner password">
                <button type="button" id="unlock-btn">Access</button>
            </div>
            <div id="submission-area" style="display:none;">
                <div id="submission-list"></div>
                <a id="download-link" href="#" download="clients.csv" style="display:none; margin-top: 10px;">Download CSV</a>
            </div>
        </div>
    </div>

    <script>
        const form = document.getElementById('client-form');
        const list = document.getElementById('submission-list');
        const ownerAccess = document.getElementById('owner-access');
        const submissionArea = document.getElementById('submission-area');
        const unlockBtn = document.getElementById('unlock-btn');
        const ownerPasswordInput = document.getElementById('owner-password');
        const downloadLink = document.getElementById('download-link');
        const STORAGE_KEY = 'clientSubmissions';
        const OWNER_UNLOCKED_KEY = 'ownerUnlocked';
        const OWNER_PASSWORD = 'm1l@neEservices';

        function escapeCsv(value) {
            return '"' + String(value).replace(/"/g, '""') + '"';
        }

        function formatSubmittedAt(timestamp) {
            const date = timestamp ? new Date(timestamp) : new Date();
            return Number.isNaN(date.getTime()) ? 'Unknown time' : date.toLocaleString();
        }

        function getStoredSubmissions() {
            try {
                return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
            } catch (error) {
                console.error('Failed to load submissions', error);
                return [];
            }
        }

        function saveSubmissions(submissions) {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(submissions));
        }

        function buildCsv(submissions) {
            const header = ['Full Name', 'Phone Number', 'Email Address', 'Service', 'Submitted At'];
            const rows = submissions.map(item => [item.fullName, item.phone, item.email, item.service, formatSubmittedAt(item.submittedAt)]);
            return [header, ...rows].map(row => row.map(escapeCsv).join(',')).join('\n');
        }

        function showOwnerView() {
            submissionArea.style.display = 'block';
            ownerAccess.style.display = 'none';
            loadSubmissions();
        }

        function hideOwnerView() {
            submissionArea.style.display = 'none';
            ownerAccess.style.display = 'block';
        }

        function isOwnerUnlocked() {
            return localStorage.getItem(OWNER_UNLOCKED_KEY) === 'true';
        }

        function loadSubmissions() {
            const submissions = getStoredSubmissions();
            if (!submissions.length) {
                list.innerHTML = '<p>No submissions yet.</p>';
                downloadLink.href = '#';
                downloadLink.style.display = 'none';
                return;
            }

            list.innerHTML = submissions.map(item => `
                <div class="submission-item">
                    <strong>${item.fullName}</strong><br>
                    Phone: ${item.phone}<br>
                    Email: ${item.email}<br>
                    Service: ${item.service}<br>
                    <small>Submitted: ${formatSubmittedAt(item.submittedAt)}</small>
                </div>
            `).join('');

            const csvData = buildCsv(submissions);
            const blob = new Blob([csvData], { type: 'text/csv;charset=utf-8;' });
            const url = URL.createObjectURL(blob);
            downloadLink.href = url;
            downloadLink.style.display = 'inline-block';
        }

        form.addEventListener('submit', function (e) {
            e.preventDefault();
            const submissions = getStoredSubmissions();
            submissions.push({
                fullName: document.getElementById('fullName').value.trim(),
                phone: document.getElementById('phone').value.trim(),
                email: document.getElementById('email').value.trim(),
                service: document.getElementById('service').value.trim(),
                submittedAt: new Date().toISOString()
            });
            saveSubmissions(submissions);
            form.reset();
            if (isOwnerUnlocked()) {
                showOwnerView();
            } else {
                loadSubmissions();
            }
        });

        unlockBtn.addEventListener('click', function () {
            if (ownerPasswordInput.value === OWNER_PASSWORD) {
                localStorage.setItem(OWNER_UNLOCKED_KEY, 'true');
                showOwnerView();
            } else {
                alert('Access denied');
            }
        });

        if (isOwnerUnlocked()) {
            showOwnerView();
        } else {
            hideOwnerView();
        }
    </script>
</body>
</html>
